name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Linting Tools
        run: pip install ruff bandit
          
      - name: Run Ruff
        run: ruff check .
        
      - name: Run Bandit
        run: bandit -r tortuga/ -c pyproject.toml || bandit -r tortuga/
        
      - name: Run ShellCheck
        run: shellcheck scripts/**/*.sh || echo "No bash scripts yet"
        
  test:
    runs-on: ubuntu-latest
    needs: static-gates
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Pytest
        run: PYTHONPATH=. pytest tests/
